<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voting System</title>
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>VOTING PORTAL</h1>
        </header>
        
        <section class="main-content">
        </section>
        
        <section class="form-section">
            <h2>Submit Your OTP Code</h2>
            <p class="form-description">Enter your department and OTP to authorize voting</p>
            
            <form id="otpForm">
                <select id="department" name="department" required>
                    <option value="" disabled selected>Select Your Department</option>
                    <option value="SPAS">SPAS - School of Pure and Applied Sciences</option>
                    <option value="EDU">EDU - Education</option>
                    <option value="BUS">BUS - Business</option>
                    <option value="ENG">ENG - Engineering</option>
                    <option value="SHS">SHS - Senior High School</option>
                </select>
                
                <input type="text" id="regNo" name="reg_no" placeholder="Enter your registration number" required>
                <input type="text" id="otp" name="otp" placeholder="Enter your OTP" required>
                
                <button type="submit" id="submitBtn">Submit</button>
                <button type="reset">Reset</button>
            </form>
            
            <!-- Alert Messages -->
            <div id="alertContainer"></div>
        </section>
        
        <!-- Admin Login Link -->
        <section class="admin-link">
            <a href="admin.html">Admin Login</a>
        </section>
        
    </div>

    <footer>
        <p>Copyright &copy;</p>
    </footer>
    
    <script>
        // =====================================================
        // FORM SUBMISSION HANDLER
        // =====================================================
        const form = document.getElementById('otpForm');
        const submitBtn = document.getElementById('submitBtn');
        const alertContainer = document.getElementById('alertContainer');
        
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Disable button during submission
            submitBtn.disabled = true;
            submitBtn.textContent = 'Submitting...';
            
            // Get form values
            const department = document.getElementById('department').value;
            const regNo = document.getElementById('regNo').value.trim();
            const otp = document.getElementById('otp').value.trim();
            
            try {
                // Send data to Vercel API route
                const response = await fetch('/api/vote', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        department: department,
                        reg_no: regNo,
                        otp: otp
                    })
                });
                
                const result = await response.json();
                
                if (!response.ok) {
                    throw new Error(result.error || 'Failed to submit');
                }
                
                // Show success message
                showAlert('success', 'OTP submitted successfully! Your vote has been recorded.');
                
                // Reset form
                form.reset();
                
            } catch (error) {
                console.error('Error submitting OTP:', error);
                
                // Show error message
                showAlert('error', 'Failed to submit OTP. Please try again.');
            } finally {
                // Re-enable button
                submitBtn.disabled = false;
                submitBtn.textContent = 'Submit';
            }
        });
        
        // =====================================================
        // ALERT FUNCTION
        // =====================================================
        function showAlert(type, message) {
            const alertClass = type === 'success' ? 'alert-success' : 'alert-error';
            const alertHTML = `
                <div class="alert ${alertClass}">
                    ${message}
                    <button class="alert-close" onclick="this.parentElement.remove()">&times;</button>
                </div>
            `;
            
            alertContainer.innerHTML = alertHTML;
            
            // Auto-remove success alerts after 5 seconds
            if (type === 'success') {
                setTimeout(() => {
                    const alert = alertContainer.querySelector('.alert');
                    if (alert) alert.remove();
                }, 5000);
            }
        }
    </script>
</body>
</html>
